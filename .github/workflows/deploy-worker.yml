name: Deploy packages.nself.org CF Worker

# Deploys the packages.nself.org Cloudflare Worker (nclaw/packages/packages-nself-org/).
# Gate: requires CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID org secrets (UA-12).
# Without secrets this workflow is a no-op. Deployment never auto-runs on push.
#
# UA-12 steps (P104 user-held):
#   1. Set CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID in nself-org GitHub org secrets
#   2. Trigger this workflow manually via workflow_dispatch → environment: production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  deploy-worker:
    name: Deploy ${{ inputs.environment }} worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Gate: CF secrets must exist (UA-12 authorization)
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Deploy worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          cd packages/packages-nself-org
          wrangler deploy --env "${{ inputs.environment }}"

      - name: Smoke test (production only)
        if: inputs.environment == 'production'
        run: |
          sleep 5
          STATUS=$(curl -sf -o /dev/null -w '%{http_code}' https://packages.nself.org/health || true)
          if [ "$STATUS" = "200" ]; then
            echo "Worker health check passed (200)"
          else
            echo "::error::Worker health check returned HTTP $STATUS"
            exit 1
          fi
