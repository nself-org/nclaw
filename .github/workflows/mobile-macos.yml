name: Mobile macOS CI

on:
  pull_request:
    paths:
      - 'nclaw/mobile/**'
      - 'nclaw/core/**'
  push:
    branches: [main]
    paths:
      - 'nclaw/mobile/**'
      - 'nclaw/core/**'

jobs:
  frb-drift:
    uses: ./.github/workflows/frb-codegen-check.yml

  macos:
    runs-on: macos-14
    needs: frb-drift
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust-mobile
        with:
          targets: aarch64-apple-darwin x86_64-apple-darwin

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Rust universal binary
        working-directory: nclaw/core
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p target/universal-macos/release
          lipo -create \
            target/aarch64-apple-darwin/release/libnclaw.dylib \
            target/x86_64-apple-darwin/release/libnclaw.dylib \
            -output target/universal-macos/release/libnclaw.dylib
          lipo -create \
            target/aarch64-apple-darwin/release/libnclaw.a \
            target/x86_64-apple-darwin/release/libnclaw.a \
            -output target/universal-macos/release/libnclaw.a

      - name: Import Apple cert (conditional)
        if: ${{ env.APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 != '' }}
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

      - name: Flutter build macOS
        working-directory: nclaw/mobile
        run: |
          flutter pub get
          flutter build macos --release

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nclaw-macos
          path: nclaw/mobile/build/macos/Build/Products/Release/*.app
          retention-days: 30
          if-no-files-found: warn
