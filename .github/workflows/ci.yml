name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Flutter: analyze, test, build APK
  # ============================================================
  flutter-analyze:
    name: Flutter Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: nself-org/plugins-pro
          path: plugins-pro
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test --update-goldens && flutter test

  flutter-build-android:
    name: Flutter Build Android
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: flutter-analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: nself-org/plugins-pro
          path: plugins-pro
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

  flutter-build-ios:
    name: Flutter Build iOS
    runs-on: macos-latest
    timeout-minutes: 20
    needs: flutter-analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: nself-org/plugins-pro
          path: plugins-pro
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Install iOS pods
        run: cd ios && pod install --repo-update
        working-directory: app

      - name: Build iOS (no codesign)
        run: flutter build ios --debug --no-codesign

  # ============================================================
  # Rust: libnclaw test + check on multiple platforms
  # ============================================================
  libnclaw-test:
    name: libnclaw Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            libs/libnclaw/target
          key: ${{ runner.os }}-libnclaw-${{ hashFiles('libs/libnclaw/Cargo.lock') }}

      - name: Run tests
        run: cargo test
        working-directory: libs/libnclaw

      - name: Check release build
        run: cargo check --release
        working-directory: libs/libnclaw

  # ============================================================
  # Swift: desktop companion build check (macOS only)
  # ============================================================
  swift-build:
    name: Swift Desktop Build
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift package
        run: swift build
        working-directory: desktop
