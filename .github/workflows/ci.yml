name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # NOTE (T-P3-E4-W2-S3-T09 2026-06-16): Flutter mobile CI jobs removed.
  # nclaw/mobile migrated to React Native + Expo (P3-E4-W2-S3).
  # EAS Build replaces flutter-action for mobile CI.
  # Removed jobs: flutter-analyze, flutter-build-android, flutter-build-ios,
  #   android-build (Flutter). Flutter archive at mobile-flutter-archive/DEPRECATED.md.

  # ============================================================
  # Rust: libnclaw test + check (crate lives in core/)
  # ============================================================
  libnclaw-test:
    name: libnclaw Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      # The crate's tauri-specta dev-dependency (-> tauri) links GTK/glib on
      # Linux via pkg-config; install the system libraries before cargo runs.
      - name: Install GTK/WebKit system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: ${{ runner.os }}-libnclaw-${{ hashFiles('core/Cargo.lock', 'Cargo.lock') }}

      - name: Run tests
        run: cargo test --locked
        working-directory: core

      - name: Check release build
        run: cargo check --locked --release
        working-directory: core

  # ============================================================
  # Desktop: Tauri companion build check (desktop/src-tauri)
  # ============================================================
  desktop-build:
    name: Desktop Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install GTK/WebKit system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-desktop-tauri-${{ hashFiles('Cargo.lock') }}

      # frontendDist (../dist) is produced by the JS build (pnpm build) at
      # release time and is gitignored. cargo check runs tauri-build's codegen,
      # which requires the directory to exist. Provide a minimal placeholder so
      # the Rust crate type-checks without a full frontend build.
      - name: Provide placeholder frontend dist
        run: |
          mkdir -p desktop/dist
          [ -f desktop/dist/index.html ] || echo '<!doctype html><title>nclaw</title>' > desktop/dist/index.html

      - name: Check Tauri desktop crate
        run: cargo check --locked --manifest-path desktop/src-tauri/Cargo.toml

  # ============================================================
  # Mobile: React Native unit tests (jest-expo)
  # ============================================================
  mobile-unit-test:
    name: Mobile Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency audit
        # P4-E5-W3-S05-T17: fail on HIGH/CRITICAL advisories.
        run: pnpm audit --audit-level=high

      - name: Typecheck
        run: pnpm --filter @nclaw/mobile typecheck

      - name: Lint
        run: pnpm --filter @nclaw/mobile lint

      - name: Unit tests
        run: pnpm --filter @nclaw/mobile test

  # ─── Android / iOS mobile builds ────────────────────────────────
  # NOTE (T-P3-E4-W2-S3-T09 2026-06-16): Flutter mobile build jobs removed.
  # Mobile CI is now via EAS Build (eas build --platform all --profile production).
  # EAS CI workflow will be added in T-P3-E4-W2-S3-T01 completion.
