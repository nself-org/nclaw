name: Publish Mobile (TestFlight + Play Store Internal)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-mobile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-ios-testflight:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'

      - name: Install App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_APP_STORE_CONNECT_API_KEY_BASE64 }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_API_KEY_KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_KEY_ID}.p8

      - name: Build Flutter iOS release
        working-directory: nclaw/app
        run: |
          flutter pub get
          flutter build ios --release --no-tree-shake-icons

      - name: Build IPA
        working-directory: nclaw/app/build/ios/Release-iphoneos
        run: |
          mkdir Payload
          mv Runner.app Payload/
          zip -r -y app.ipa Payload/

      - name: Upload to TestFlight
        env:
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_API_KEY_KEY_ID: ${{ secrets.APPLE_APP_STORE_CONNECT_KEY_ID }}
        run: |
          xcrun altool --upload-app \
            --file "nclaw/app/build/ios/Release-iphoneos/app.ipa" \
            --type ios \
            -u "$APPLE_API_KEY_ISSUER_ID" \
            -p "$APPLE_API_KEY_KEY_ID" \
            --output-format json

      - name: Wait for TestFlight processing
        run: sleep 60

  publish-android-play-internal:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          channel: 'stable'

      - name: Setup Google Play credentials
        env:
          PLAY_CONSOLE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_CONSOLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p ~/.config/play
          echo "$PLAY_CONSOLE_SERVICE_ACCOUNT_JSON" > ~/.config/play/service-account.json

      - name: Build Flutter Android release
        working-directory: nclaw/app
        run: |
          flutter pub get
          flutter build appbundle --release --no-tree-shake-icons

      - name: Upload AAB to Google Play (internal track)
        env:
          PLAY_CONSOLE_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_CONSOLE_SERVICE_ACCOUNT_JSON }}
        run: |
          # Install fastlane
          gem install fastlane --no-document

          cd nclaw/app

          fastlane supply \
            --aab build/app/outputs/bundle/release/app-release.aab \
            --track internal \
            --json_key ~/.config/play/service-account.json \
            --check_superseded_tracks

      - name: Archive Play Store metadata
        uses: actions/upload-artifact@v4
        with:
          name: play-store-release
          path: nclaw/app/fastlane/metadata/
          retention-days: 30
