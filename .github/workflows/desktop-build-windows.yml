name: Desktop Windows Build
# Disabled via API (disabled_manually) — re-enable before running a release.
# Triggered by release.yml via workflow_call on tag push (v*).
# workflow_call trigger is required for release.yml to invoke this workflow.

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.0)'
        required: false

concurrency:
  group: desktop-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip gracefully on branch pushes; only run on tag pushes, workflow_call (from release.yml), or workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch'
    runs-on: windows-2022
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with: { version: '9' }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm', cache-dependency-path: 'desktop/pnpm-lock.yaml' }

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: 'x86_64-pc-windows-msvc' }

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: cargo-windows-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Install pnpm deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (unsigned at v1.1.1; signing wired in T06 once EV cert lands)
        working-directory: desktop
        run: cargo tauri build --target x86_64-pc-windows-msvc

      # secrets context is not allowed in step `if:` — it invalidates the whole
      # workflow at parse time. Gate via an output check instead.
      - name: Check EV cert secret presence
        id: evcheck
        shell: bash
        env:
          EV_THUMB: ${{ secrets.WINDOWS_EV_CERT_THUMBPRINT }}
        run: echo "present=$([ -n "$EV_THUMB" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Conditional signtool (no-op until WINDOWS_EV_CERT_THUMBPRINT secret set)
        if: steps.evcheck.outputs.present == 'true' 
        run: |
          $files = Get-ChildItem -Path "desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle" -Recurse -Include *.msi,*.exe
          foreach ($f in $files) {
            signtool sign /sha1 "$env:WINDOWS_EV_CERT_THUMBPRINT" /tr http://timestamp.digicert.com /td sha256 /fd sha256 "$f.FullName"
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-x64
          path: |
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30
