name: Desktop Builds

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.22.0'

jobs:
  build-macos:
    name: macOS (universal)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd macos && pod install --repo-update

      - name: Build macOS release
        run: flutter build macos --release

      - name: Code sign
        if: env.APPLE_TEAM_ID != ''
        env:
          APPLE_TEAM_NAME: ${{ secrets.APPLE_TEAM_NAME }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_CERT: ${{ secrets.APPLE_SIGNING_CERT }}
          APPLE_SIGNING_CERT_PASSWORD: ${{ secrets.APPLE_SIGNING_CERT_PASSWORD }}
        run: |
          # Import certificate
          echo "$APPLE_SIGNING_CERT" | base64 --decode > cert.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import cert.p12 -k build.keychain -P "$APPLE_SIGNING_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k actions build.keychain
          rm cert.p12

          cd ..
          bash scripts/codesign-macos.sh "app/build/macos/Build/Products/Release/Claw.app"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: |
          cd ..
          bash scripts/build-dmg.sh "${GITHUB_REF_NAME#v}"

      - name: Notarize
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          cd ..
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/notarize-macos.sh "app/build/macos/Claw-${VERSION}.dmg"

      - name: Upload DMG
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: app/build/macos/Claw-*.dmg

  build-linux:
    name: Linux (x86_64)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev libblkid-dev liblzma-dev libappindicator3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Build AppImage
        run: |
          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          export PATH="/tmp:$PATH"
          cd ..
          bash scripts/build-appimage.sh "${GITHUB_REF_NAME#v}"
        env:
          LINUX_SIGNING_GPG_KEY: ${{ secrets.LINUX_SIGNING_GPG_KEY }}

      - name: Build .deb
        run: |
          cd ..
          bash scripts/build-deb.sh "${GITHUB_REF_NAME#v}"

      - name: Build .rpm
        run: |
          sudo apt-get install -y ruby ruby-dev rubygems build-essential rpm
          sudo gem install fpm --no-document
          cd ..
          bash scripts/build-rpm.sh "${GITHUB_REF_NAME#v}"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages
          path: |
            app/build/linux/Claw-*.AppImage
            app/build/linux/Claw-*.AppImage.asc
            app/build/linux/claw_*.deb
            app/build/linux/claw-*.rpm

  build-windows:
    name: Windows (x64)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Build MSIX
        run: flutter pub run msix:create

      - name: Upload MSIX
        uses: actions/upload-artifact@v7
        with:
          name: windows-msix
          path: app/build/windows/x64/runner/Release/*.msix

  release:
    name: Create Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: true
