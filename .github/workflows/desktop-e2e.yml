name: Desktop E2E
on:
  pull_request:
    paths: ['nclaw/desktop/**']
  push:
    branches: [main]
    paths: ['nclaw/desktop/**']

concurrency:
  group: desktop-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: '9'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: nclaw/desktop/pnpm-lock.yaml
      - name: Install deps
        working-directory: nclaw/desktop
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: nclaw/desktop
        run: pnpm exec playwright install --with-deps chromium
      - name: Unit gate
        working-directory: nclaw/desktop
        run: pnpm vitest run
      - name: E2E gate
        working-directory: nclaw/desktop
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}
          path: nclaw/desktop/playwright-report/
