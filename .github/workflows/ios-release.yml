# ios-release.yml — ɳClaw iOS Release + TestFlight Upload
#
# ============================================================
# USER ACTION REQUIRED — Apple secrets must be added to
# GitHub repository secrets before this workflow will run.
# ============================================================
#
# Required secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_CERTIFICATE
#     Base64-encoded .p12 certificate file.
#     How to obtain:
#       1. Open Keychain Access on macOS.
#       2. Export your Apple Distribution certificate as a .p12 file.
#       3. Base64-encode it: base64 -i Certificates.p12 | pbcopy
#     Apple Developer Portal: https://developer.apple.com/account/resources/certificates
#
#   APPLE_CERTIFICATE_PASSWORD
#     The passphrase you set when exporting the .p12 file.
#
#   APPLE_TEAM_ID
#     Your 10-character Apple Developer Team ID.
#     Found at: https://developer.apple.com/account → Membership → Team ID
#
#   APP_STORE_CONNECT_API_KEY_ID
#     The Key ID from your App Store Connect API key.
#     How to obtain: App Store Connect → Users and Access → Integrations → Keys → (+) New Key
#     Select "App Manager" role. Copy the Key ID shown.
#
#   APP_STORE_CONNECT_API_KEY_ISSUER_ID
#     The Issuer ID shown at the top of the Keys page in App Store Connect.
#
#   APP_STORE_CONNECT_API_KEY
#     The content of the downloaded .p8 API key file.
#     Download it once when creating the key (cannot be re-downloaded).
#     Copy the raw .p8 content (-----BEGIN EC PRIVATE KEY----- … -----END EC PRIVATE KEY-----).
#
# ============================================================

name: iOS Release — ɳClaw

on:
  push:
    tags:
      - 'nclaw-v*'
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload IPA to TestFlight'
        required: false
        type: boolean
        default: true

concurrency:
  group: ios-release-nclaw-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ios-release:
    name: Build & Upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 60

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Import Apple signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS IPA
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload to TestFlight
        if: ${{ github.event_name == 'push' || inputs.upload_to_testflight }}
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: mobile/build/ios/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nclaw-ios-ipa-${{ github.sha }}
          path: mobile/build/ios/ipa/*.ipa
          retention-days: 14
