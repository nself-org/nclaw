name: Mobile iOS CI

on:
  pull_request:
    paths:
      - 'nclaw/mobile/**'
      - 'nclaw/core/**'
  push:
    branches: [main]
    paths:
      - 'nclaw/mobile/**'
      - 'nclaw/core/**'

jobs:
  frb-drift:
    uses: ./.github/workflows/frb-codegen-check.yml

  ios:
    runs-on: macos-14
    needs: frb-drift
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust-mobile
        with:
          targets: aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Rust targets
        working-directory: nclaw/core
        run: |
          cargo build --release --target aarch64-apple-ios
          cargo build --release --target aarch64-apple-ios-sim
          cargo build --release --target x86_64-apple-ios
          mkdir -p target/universal-ios-sim/release
          lipo -create \
            target/aarch64-apple-ios-sim/release/libnclaw.a \
            target/x86_64-apple-ios/release/libnclaw.a \
            -output target/universal-ios-sim/release/libnclaw.a

      - name: Import Apple cert (conditional)
        if: ${{ env.APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 != '' }}
        env:
          APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          echo "$APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" -A -t cert -f pkcs12
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')

      - name: Flutter build iOS
        working-directory: nclaw/mobile
        run: |
          flutter pub get
          if [ -n "${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 }}" ]; then
            flutter build ipa --release
          else
            flutter build ios --release --no-codesign
          fi

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: nclaw-ios
          path: |
            nclaw/mobile/build/ios/iphoneos/*.app
            nclaw/mobile/build/ipa/*.ipa
          retention-days: 30
          if-no-files-found: warn
