name: Quarterly doc audit

on:
  # 08:00 UTC on day 1 of every 3rd month: Jan, Apr, Jul, Oct.
  schedule:
    - cron: "0 8 1 */3 *"
  workflow_dispatch:
    inputs:
      apply_autofix:
        description: "Apply safe auto-fixes and open a PR"
        required: false
        default: "true"

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Determine quarter label
        id: quarter
        run: |
          YEAR=$(date -u +%Y)
          MONTH=$(date -u +%m)
          Q=$(( (10#$MONTH - 1) / 3 + 1 ))
          echo "label=${YEAR}-Q${Q}" >> "$GITHUB_OUTPUT"

      - name: Install nself audit tool
        run: |
          # Build the audit tool from the cli repo (sibling checkout).
          # If the current repo is the CLI itself, build from ./cmd/nself.
          # Otherwise, fetch the pinned release.
          if [ -f ./cmd/nself/main.go ]; then
            go build -mod=vendor -o /usr/local/bin/nself ./cmd/nself/
          else
            # Grab the latest nself CLI release from the tap. GitHub's
            # releases/latest endpoint can 404 transiently right after a tag
            # is cut (asset upload lag) or hit the 60 req/hr unauthenticated
            # rate limit — retry with backoff instead of failing the whole
            # scheduled job on a single flaky request (2026-07-01 incident:
            # every repo's quarterly run 404'd within the same publish window).
            LATEST=""
            for attempt in 1 2 3 4 5; do
              LATEST=$(curl -fsSL "https://api.github.com/repos/nself-org/cli/releases/latest" \
                | grep tag_name | head -1 | cut -d'"' -f4 | sed 's/^v//' || true)
              if [ -n "$LATEST" ]; then
                break
              fi
              echo "Attempt ${attempt}/5: releases/latest not available yet, retrying in $((attempt * 5))s..."
              sleep $((attempt * 5))
            done

            if [ -z "$LATEST" ]; then
              echo "::warning::Could not resolve nself CLI release after 5 attempts — skipping audit tool install, doc audit will run in degraded (findings-only) mode."
            else
              OS=$(uname -s | tr '[:upper:]' '[:lower:]')
              ARCH=$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')
              if curl -fsSL "https://github.com/nself-org/cli/releases/download/v${LATEST}/nself-${LATEST}-${OS}-${ARCH}.tar.gz" \
                | tar -xz -C /tmp; then
                sudo mv /tmp/nself /usr/local/bin/nself
              else
                echo "::warning::Failed to download nself CLI v${LATEST} — skipping audit tool install."
              fi
            fi
          fi
          nself --version || echo "::notice::nself CLI unavailable this run; doc audit step will no-op gracefully."

      - name: Run doc audit
        id: audit
        run: |
          mkdir -p .claude/qa/findings
          REPORT=".claude/qa/findings/${{ steps.quarter.outputs.label }}-doc-audit.json"

          if ! command -v nself >/dev/null 2>&1; then
            echo "::warning::nself CLI not installed this run (release fetch failed) — skipping audit, will retry next scheduled run."
            echo '{"skipped":true,"reason":"nself CLI unavailable"}' > "${REPORT}"
            echo "report=${REPORT}" >> "$GITHUB_OUTPUT"
            echo "exit=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          set +e
          nself audit docs \
            --root "${GITHUB_WORKSPACE}" \
            --output "${REPORT}" \
            --summary \
            --quarter "${{ steps.quarter.outputs.label }}"
          EXIT=$?
          set -e
          echo "report=${REPORT}" >> "$GITHUB_OUTPUT"
          echo "exit=${EXIT}" >> "$GITHUB_OUTPUT"
          # Exit codes: 0 clean, 1 findings (expected), 2 scan failed.
          if [ "${EXIT}" -eq 2 ]; then
            exit 2
          fi

      - name: Apply auto-fixes (banned words only)
        id: fix
        if: ${{ github.event.inputs.apply_autofix != 'false' }}
        run: |
          set +e
          nself audit docs \
            --root "${GITHUB_WORKSPACE}" \
            --output "${{ steps.audit.outputs.report }}" \
            --quarter "${{ steps.quarter.outputs.label }}" \
            --fix
          echo "ran=true" >> "$GITHUB_OUTPUT"

      - name: Open auto-fix PR
        if: ${{ github.event.inputs.apply_autofix != 'false' }}
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs(audit): quarterly sweep ${{ steps.quarter.outputs.label }}"
          title: "Quarterly doc audit — ${{ steps.quarter.outputs.label }}"
          body-path: ${{ steps.audit.outputs.report }}
          branch: audit/quarterly-${{ steps.quarter.outputs.label }}
          delete-branch: true
          add-paths: |
            **/*.md
            **/*.mdx
            .claude/qa/findings/*.json

      - name: Upload JSON report
        uses: actions/upload-artifact@v7
        with:
          name: doc-audit-${{ steps.quarter.outputs.label }}
          path: .claude/qa/findings/${{ steps.quarter.outputs.label }}-doc-audit.json
          retention-days: 180
