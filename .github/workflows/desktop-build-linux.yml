name: Desktop Linux Build
# Disabled via API (disabled_manually) — re-enable before running a release.
# Triggered by release.yml via workflow_call on tag push (v*).
# workflow_call trigger is required for release.yml to invoke this workflow.

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.2.0)'
        required: false

concurrency:
  group: desktop-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip gracefully on branch pushes; only run on tag pushes, workflow_call (from release.yml), or workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev

      - uses: pnpm/action-setup@v3
        with: { version: '9' }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm', cache-dependency-path: 'desktop/pnpm-lock.yaml' }

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: ${{ matrix.target }} }

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: cargo-linux-${{ matrix.arch }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Install pnpm deps
        working-directory: desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (AppImage + deb + rpm)
        working-directory: desktop
        run: cargo tauri build --target ${{ matrix.target }} --bundles appimage,deb,rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ matrix.arch }}
          path: |
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          retention-days: 30
