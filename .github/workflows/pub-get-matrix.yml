name: Flutter pub get matrix

on:
  pull_request:
    paths:
      - "app/pubspec.yaml"
      - "app/pubspec.lock"
  push:
    branches: [main]
    paths:
      - "app/pubspec.yaml"
      - "app/pubspec.lock"

jobs:
  pub-get:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04, windows-2022]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.27.0"
          channel: stable

      - name: flutter pub get
        working-directory: app
        run: flutter pub get

      - name: Check pubspec.lock drift
        working-directory: app
        run: git diff --exit-code pubspec.lock
