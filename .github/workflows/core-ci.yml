name: nclaw-core CI

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - '.github/workflows/core-ci.yml'
  pull_request:
    paths:
      - 'core/**'
      - '.github/workflows/core-ci.yml'

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 1.91 is the MSRV: specta (via the tauri-specta dev-dep) uses the
        # debug_closure_helpers feature (std::fmt::from_fn), stabilized in 1.91.
        os: [macos-14, ubuntu-latest, windows-latest]
        rust: [stable, "1.91"]
    steps:
      - uses: actions/checkout@v4

      # Linux desktop dev-dependency (tauri-specta -> tauri) links GTK/glib via
      # pkg-config; install the system libraries before any cargo build.
      - name: Install GTK/WebKit system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: core/target
          key: ${{ runner.os }}-cargo-build-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.rust }}-

      - name: Run tests
        run: cargo test --workspace --manifest-path core/Cargo.toml

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --manifest-path core/Cargo.toml -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # --all-targets compiles test/bench targets that pull the tauri-specta
      # dev-dependency (-> tauri -> glib-sys/gobject-sys), which links GTK via
      # pkg-config. Install the system libraries first.
      - name: Install GTK/WebKit system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: core/target
          key: ubuntu-latest-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-clippy-
      - run: cargo clippy --all-targets --manifest-path core/Cargo.toml -- -D warnings

  doc:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: core/target
          key: ubuntu-latest-cargo-doc-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-doc-
      - run: cargo doc --no-deps --manifest-path core/Cargo.toml

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Cargo.lock is gitignored. core is a workspace member, so the lockfile is
      # generated at the workspace root (./Cargo.lock), which is where the action
      # looks by default (working-directory ".").
      - name: Generate lockfile
        run: cargo generate-lockfile --manifest-path core/Cargo.toml
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Unmaintained advisories only — transitive, no vulnerability, no
          # upgrade path. Kept in sync with core/deny.toml's ignore list.
          ignore: RUSTSEC-2024-0370,RUSTSEC-2024-0384,RUSTSEC-2024-0412,RUSTSEC-2024-0413,RUSTSEC-2024-0415,RUSTSEC-2024-0416,RUSTSEC-2024-0418,RUSTSEC-2024-0419,RUSTSEC-2024-0420,RUSTSEC-2024-0436,RUSTSEC-2025-0052,RUSTSEC-2025-0075,RUSTSEC-2025-0080,RUSTSEC-2025-0081,RUSTSEC-2025-0098,RUSTSEC-2025-0100

  deny:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: core/Cargo.toml
          # The action's bundled Cargo must be new enough to parse edition2024
          # manifests in the dependency tree (clap_lex, idna_adapter, etc.).
          rust-version: "1.95.0"
