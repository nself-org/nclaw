name: Companion Desktop Builds

on:
  push:
    branches: [main]
    paths:
      - 'desktop/tauri/**'
  workflow_dispatch:

jobs:
  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build Tauri app
        working-directory: desktop/tauri
        run: cargo tauri build

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: companion-${{ matrix.target }}
          path: |
            desktop/tauri/target/release/bundle/appimage/*.AppImage
            desktop/tauri/target/release/bundle/deb/*.deb

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: companion-${{ matrix.target }}
          path: |
            desktop/tauri/target/release/bundle/msi/*.msi
            desktop/tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: companion-${{ matrix.target }}
          path: |
            desktop/tauri/target/release/bundle/dmg/*.dmg
