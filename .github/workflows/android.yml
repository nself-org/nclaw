name: Android Build & Play Store

on:
  push:
    tags:
      - 'v*-beta*'
      - 'v*-rc*'
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        default: 'build_only'
        type: choice
        options:
          - build_only
          - beta
          - release

permissions:
  contents: read

jobs:
  android-build:
    name: Build Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    env:
      GOOGLE_PLAY_JSON_KEY_PATH: ${{ github.workspace }}/app/fastlane/play-store-key.json
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-based versionCode

      - uses: actions/checkout@v4
        with:
          repository: nself-org/plugins-pro
          path: plugins-pro
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Write key.properties
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/claw-release.jks
          cat > android/key.properties <<PROPS
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=claw-release.jks
          PROPS

      - name: Write Play Store service account key
        if: env.GOOGLE_PLAY_JSON_KEY != ''
        env:
          GOOGLE_PLAY_JSON_KEY: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
        run: echo "$GOOGLE_PLAY_JSON_KEY" > fastlane/play-store-key.json

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: app

      - name: Install fastlane
        run: gem install fastlane

      - name: Determine lane
        id: lane
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "name=beta" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ github.event.inputs.lane }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run fastlane
        run: fastlane android ${{ steps.lane.outputs.name }}

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nclaw-android-${{ github.sha }}
          path: app/build/app/outputs/bundle/*Release/*.aab
          retention-days: 14
