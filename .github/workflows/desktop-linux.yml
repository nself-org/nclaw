name: Desktop Linux Build

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: desktop-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev

      - uses: pnpm/action-setup@v3
        with: { version: '9' }

      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'pnpm', cache-dependency-path: 'nclaw/apps/desktop/pnpm-lock.yaml' }

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: ${{ matrix.target }} }

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nclaw/apps/desktop/src-tauri/target
          key: cargo-linux-${{ matrix.arch }}-${{ hashFiles('nclaw/apps/desktop/src-tauri/Cargo.lock') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Install pnpm deps
        working-directory: nclaw/apps/desktop
        run: pnpm install --frozen-lockfile

      - name: Build Tauri (AppImage + deb + rpm)
        working-directory: nclaw/apps/desktop
        run: cargo tauri build --target ${{ matrix.target }} --bundles appimage,deb,rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-${{ matrix.arch }}
          path: |
            nclaw/apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            nclaw/apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            nclaw/apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
          retention-days: 30
