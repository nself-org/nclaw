name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: nself-org/plugins-pro
          path: plugins-pro
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        run: flutter test

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: nself-org/plugins-pro
          path: plugins-pro
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: android-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk

  build-macos:
    name: Build macOS Desktop
    runs-on: macos-latest
    needs: analyze
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: nself-org/plugins-pro
          path: plugins-pro
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: cd macos && pod install --repo-update

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/nclaw.app"
          DMG_NAME="nClaw-macOS.dmg"
          hdiutil create -volname "nClaw" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_NAME"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: app/nClaw-macOS.dmg

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-macos]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts/android

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/macos

      - name: Rename artifacts with version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv artifacts/android/app-release.apk "artifacts/nClaw-${VERSION}-android.apk"
          mv artifacts/macos/nClaw-macOS.dmg "artifacts/nClaw-${VERSION}-macOS.dmg"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/nClaw-*-android.apk
            artifacts/nClaw-*-macOS.dmg
