# cargo-deny configuration for nclaw-core.
#
# Purpose: gate the dependency graph on license, advisory, ban, and source policy.
# Without this file cargo-deny falls back to built-in defaults that reject every
# license (including MIT/Apache-2.0), which is why the License Check job failed.
#
# Policy: allow the standard permissive / public-domain licenses that the entire
# dependency tree resolves to (verified via `cargo deny check licenses` against
# Cargo.lock). All entries below are actually present in the graph; nothing is
# added speculatively. Copyleft families (GPL/AGPL/SSPL) remain disallowed by
# omission, matching nClaw's MIT distribution.

[graph]
all-features = true

[licenses]
# SPDX expressions that are acceptable for a permissively-licensed product.
# Every license here is present in the resolved dependency graph.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "BSL-1.0",
    "Unicode-3.0",
    "Unlicense",
    "CC0-1.0",
    "MPL-2.0",
    # OSI-approved permissive license used by the optional embedded-pg feature
    # (postgresql_embedded family). Functionally equivalent to BSD/MIT.
    "PostgreSQL",
    # Community Data License Agreement Permissive 2.0 — a permissive, non-copyleft
    # *data* license (not a code license) used by webpki-roots to distribute
    # Mozilla's CA root certificate bundle. Pulled in transitively via the
    # reqwest rustls-tls stack (hyper-rustls -> webpki-roots), added when
    # reqwest switched from native-tls to rustls-tls for Android cross-compile
    # (commit 152b3de). Equivalent in spirit to CC-BY for data; no code
    # copyleft obligations.
    "CDLA-Permissive-2.0",
]
# r-efi is "MIT OR Apache-2.0 OR LGPL-2.1-or-later" — the MIT/Apache choices
# above already satisfy it, so LGPL is intentionally not allow-listed.
# Confidence threshold for detecting a license from a text file (0.0 - 1.0).
# allo-isolate has no SPDX field in its manifest but ships an Apache-2.0 LICENSE
# file; the detector resolves it from the file text above this threshold.
confidence-threshold = 0.8

[bans]
# Duplicate versions of a crate are common and acceptable in a large async/crypto
# tree; warn rather than fail so the License Check job stays focused on licensing.
multiple-versions = "warn"
wildcards = "allow"

[advisories]
# Security vulnerabilities and yanked crates remain hard failures.
# The ignore list holds only "unmaintained"/"unsound" advisories (not
# vulnerabilities): each is transitive through the Tauri GTK3/Linux backend
# (gtk-rs family, glib, async-std, instant, paste, unic-*, proc-macro-error) or
# the embedded-pg / image stacks. None has a vulnerability or an available
# upgrade path on the GTK3 toolchain (the glib unsound fix lands in 0.20, which
# requires a gtk4 migration); they resolve only when the upstream crates update
# their own dependencies. Kept in sync with .github/workflows/core-ci.yml.
ignore = [
    "RUSTSEC-2024-0370", # proc-macro-error unmaintained
    "RUSTSEC-2024-0384", # instant unmaintained
    "RUSTSEC-2024-0411", # gdkwayland-sys gtk3 binding unmaintained
    "RUSTSEC-2024-0412", # gtk-rs gtk3 binding unmaintained
    "RUSTSEC-2024-0413", # gtk-rs gtk3 binding unmaintained
    "RUSTSEC-2024-0414", # gdkx11-sys gtk3 binding unmaintained
    "RUSTSEC-2024-0415", # gtk-rs gtk3 binding unmaintained
    "RUSTSEC-2024-0416", # gtk-rs gtk3 binding unmaintained
    "RUSTSEC-2024-0417", # gdkx11 gtk3 binding unmaintained
    "RUSTSEC-2024-0418", # gtk-rs gtk3 binding unmaintained
    "RUSTSEC-2024-0419", # gtk-rs gtk3 binding unmaintained
    "RUSTSEC-2024-0420", # gtk-rs gtk3 binding unmaintained
    "RUSTSEC-2024-0429", # glib <0.20 VariantStrIter unsound (transitive via tauri gtk3)
    "RUSTSEC-2024-0436", # paste unmaintained
    "RUSTSEC-2025-0075", # unic-char-range unmaintained
    "RUSTSEC-2025-0080", # unic-common unmaintained
    "RUSTSEC-2025-0081", # unic-char-property unmaintained
    "RUSTSEC-2025-0098", # unic-ucd-version unmaintained
    "RUSTSEC-2025-0100", # unic-ucd-ident unmaintained
]

[sources]
# Only allow crates.io as a registry source.
unknown-registry = "deny"
unknown-git = "deny"
