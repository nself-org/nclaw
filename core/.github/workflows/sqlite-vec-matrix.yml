name: sqlite-vec cross-compile matrix

# S04 sqlite-vec multi-platform build verification.
# Compiles vendored sqlite-vec (git submodule at core/vendor/sqlite-vec, v0.1.9) via build.rs
# using the `cc` crate across all supported targets. Fails the workflow if any target
# fails to build the sqlite-vec C source or link the `mobile-sqlite` feature.

on:
  push:
    branches: [main]
    paths:
      - 'core/**'
      - 'core/vendor/sqlite-vec/**'
      - 'core/.github/workflows/sqlite-vec-matrix.yml'
      - '.gitmodules'
  pull_request:
    paths:
      - 'core/**'
      - 'core/vendor/sqlite-vec/**'
      - 'core/.github/workflows/sqlite-vec-matrix.yml'
      - '.gitmodules'
  workflow_dispatch:

env:
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-13 (x86_64)
            os: macos-13
            target: x86_64-apple-darwin
            use_cross: false
          - label: macos-14 (arm64)
            os: macos-14
            target: aarch64-apple-darwin
            use_cross: false
          - label: ubuntu-22.04 (x86_64)
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - label: ubuntu-22.04 (arm64 via cross)
            os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - label: windows-2022 (x86_64)
            os: windows-2022
            target: x86_64-pc-windows-msvc
            use_cross: false

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Verify sqlite-vec submodule present
        shell: bash
        run: |
          if [ ! -f core/vendor/sqlite-vec/sqlite-vec.c ] && [ ! -d core/vendor/sqlite-vec/sqlite-vec ]; then
            echo "ERROR: sqlite-vec submodule not initialized at core/vendor/sqlite-vec"
            ls -la core/vendor/sqlite-vec || true
            exit 1
          fi
          echo "sqlite-vec submodule present"
          git -C core/vendor/sqlite-vec rev-parse HEAD

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (for aarch64 linux)
        if: matrix.use_cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: Compute submodule SHA for cache key
        id: submodule
        shell: bash
        run: echo "sha=$(git -C core/vendor/sqlite-vec rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('core/Cargo.lock') }}-${{ steps.submodule.outputs.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: core/target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('core/Cargo.lock') }}-${{ steps.submodule.outputs.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-

      - name: cargo check (sqlite-vec feature)
        working-directory: core
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross check --lib --no-default-features --features mobile-sqlite --target ${{ matrix.target }}
          else
            cargo check --lib --no-default-features --features mobile-sqlite --target ${{ matrix.target }}
          fi

      - name: cargo test sqlite-vec unit tests
        if: matrix.use_cross == false
        working-directory: core
        shell: bash
        run: |
          # Run only sqlite-vec / vector_store unit tests under the mobile-sqlite feature.
          # Filter to storage::vector_store and sqlite_vec test modules; tolerate absence
          # of either path while S04.T03 lands real impl — but build must succeed.
          cargo test --lib --no-default-features --features mobile-sqlite --target ${{ matrix.target }} \
            -- --nocapture storage::vector_store sqlite_vec || \
          cargo test --lib --no-default-features --features mobile-sqlite --target ${{ matrix.target }} \
            -- --nocapture --skip integration

      - name: cargo test (cross, build-only)
        if: matrix.use_cross == true
        working-directory: core
        shell: bash
        run: |
          # cross-compiled tests cannot execute on the host; verify they build.
          cross test --lib --no-default-features --features mobile-sqlite --target ${{ matrix.target }} --no-run
