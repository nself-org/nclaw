[package]
name = "libnclaw"
version = "0.1.0"
edition = "2021"
description = "Shared types, protocol, and E2E encryption for nClaw clients"
license = "MIT"

[lib]
crate-type = ["lib"]

[[bench]]
name = "types_serde"
harness = false

[[bench]]
name = "types_clone"
harness = false

[[bench]]
name = "memory_search"
harness = false

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# E2E encryption: X25519 key exchange + ChaCha20-Poly1305 AEAD
x25519-dalek = { version = "2", features = ["static_secrets"] }
chacha20poly1305 = "0.10"
rand_core = { version = "0.6", features = ["getrandom"] }
base64 = "0.22"
thiserror = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros"] }
tokio-util = { version = "0.7", features = ["slab"] }
log = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "json", "env-filter"] }
tracing-appender = "0.2"
figment = { version = "0.10", features = ["toml"] }
dirs = "5"
toml = "0.8"
flutter_rust_bridge = "2.5"
async-trait = "0.1"
llama-cpp-2 = { version = "0.1.146", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
ts-rs = "10"
tauri-specta = "2.0.0-rc.25"

[features]
default = ["cpu"]
cpu = ["dep:llama-cpp-2"]
metal = ["dep:llama-cpp-2", "llama-cpp-2/metal"]
cuda = ["dep:llama-cpp-2", "llama-cpp-2/cuda"]
vulkan = ["dep:llama-cpp-2", "llama-cpp-2/vulkan"]
frb-export = []
ts-export = []

[[bin]]
name = "export-bindings"
path = "src/bin/export-bindings.rs"
required-features = ["ts-export"]
