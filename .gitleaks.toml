# Gitleaks configuration for nSelf ecosystem
# P96 S102 — canonical credential scanner rules
# P4 E5 W1 S02 T07 — comprehensive allowlist for confirmed false positives
title = "nSelf Gitleaks Config"

[extend]
useDefault = true

[[rules]]
id = "stripe-live-key"
description = "Stripe Live Secret Key"
regex = '''sk_live_[a-zA-Z0-9]{24,}'''
tags = ["stripe", "secret"]

[[rules]]
id = "github-pat-classic"
description = "GitHub Personal Access Token (classic)"
regex = '''ghp_[a-zA-Z0-9]{36,}'''
tags = ["github", "pat"]

[[rules]]
id = "github-pat-fine-grained"
description = "GitHub Fine-Grained Personal Access Token"
regex = '''github_pat_[a-zA-Z0-9_]{82,}'''
tags = ["github", "pat"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key ID"
regex = '''AKIA[A-Z0-9]{16}'''
tags = ["aws", "secret"]

[[rules]]
id = "google-api-key"
description = "Google API Key"
regex = '''AIza[A-Za-z0-9_\-]{35}'''
tags = ["google", "secret"]

[[rules]]
id = "rsa-private-key"
description = "RSA Private Key Header"
regex = '''-----BEGIN RSA PRIVATE KEY-----'''
tags = ["ssh", "secret"]

[[rules]]
id = "ec-private-key"
description = "EC Private Key Header"
regex = '''-----BEGIN EC PRIVATE KEY-----'''
tags = ["ssh", "secret"]

[[rules]]
id = "openssh-private-key"
description = "OpenSSH Private Key Header"
regex = '''-----BEGIN OPENSSH PRIVATE KEY-----'''
tags = ["ssh", "secret"]

[[rules]]
id = "nself-license-key"
description = "nSelf Pro Plugin License Key"
regex = '''nself_pro_[a-zA-Z0-9]{32,}'''
tags = ["nself", "license", "secret"]

[allowlist]
description = "Allow known test fixtures, documentation examples, and verified false positives (P4 E5 W1 S02 T07)"

# False-positive paths
paths = [
  '''.gitleaks.toml''',
  # Documentation and wiki files
  '''docs/.*''',
  '''\.github/wiki/.*''',
  # Test data and fixture files
  '''testdata/.*''',
  '''test/.*fixtures.*''',
  '''.*\.test\.(js|ts|jsx|tsx|dart)$''',
  '''.*\.spec\.(js|ts|jsx|tsx)$''',
  # Backend test scripts with fixture JWT secrets and placeholder values
  '''backend/scripts/.*''',
  # iOS release workflow — doc comment line describing .p8 key format
  # (line: "Copy the raw .p8 content (-----BEGIN EC PRIVATE KEY----- … -----END EC PRIVATE KEY-----)")
  # Not an actual key — just a comment explaining what to put in the secret.
  '''\.github/workflows/ios-release\.yml''',
  # macOS release workflow — identical doc comment pattern
  '''\.github/workflows/macos-release\.yml''',
  # Gitleaks CI workflow definition (contains fake keys for injection test)
  '''\.github/workflows/gitleaks\.yml''',
  # Podfile.lock — dependency hashes are not secrets
  '''mobile/ios/Podfile\.lock''',
  # Notification preferences key — storage key name, not a secret value
  '''mobile/hooks/useNotifications\.ts''',
]

# Regex-based suppression for known-safe patterns
regexes = [
  # Fake test keys for CI gate testing
  '''sk_live_FAKE_TEST_FOR_CI_GATE''',
  '''AKIA_FAKE_TEST_KEY_DO_NOT_USE''',
  '''AIza_FAKE_GOOGLE_KEY_DO_NOT_USE''',
  '''nself_pro_FAKE_TEST_KEY_DO_NOT_USE''',
  # Placeholder/template format (CHANGE_ME pattern)
  '''CHANGE_ME''',
  # False positive: SQLite encryption key lookup constant (not a secret value)
  # app/lib/services/encrypted_db_service.dart:29 — constant string used as FlutterSecureStorage key name
  '''nclaw\.db\.passphrase\.v1''',
  # False positive: storage preference key names
  '''nclaw_notification_prefs_v1''',
  # False positive: XChaCha20-Poly1305 is a cipher suite name, not a secret
  '''XChaCha20-Poly1305''',
  # JWT secret placeholder in test fixtures
  '''jwt_secret_at_least_32_chars_xxxxx''',
  # Doc comment describing .p8 format — not an actual EC key
  '''-----BEGIN EC PRIVATE KEY----- … -----END EC PRIVATE KEY-----''',
]

# Fingerprint-based suppression for specific known false positive commits (gitleaks v8)
commits = [
  # encrypted_db_service.dart _passphraseKey constant — storage key name, not a secret
  "670c936362bb0c1b574dd8882bfd1c49a1939b95",
  # Changelog.md XChaCha20-Poly1305 cipher name in v0.9.x documentation
  "a722d27b1d9cacfae46e7e6968138bb58557d538",
]
