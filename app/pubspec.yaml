name: nclaw
description: "Flutter companion app for nClaw AI assistant. Connects to a self-hosted nSelf backend running the nself-claw plugin."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_secure_storage: ^9.2.4
  web_socket_channel: ^3.0.2
  http: ^1.3.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1
  url_launcher: ^6.3.1
  flutter_local_notifications: ^17.2.2
  mobile_scanner: ^7.2.0
  app_links: ^6.3.4
  markdown: ^7.2.2
  flutter_markdown: ^0.7.4
  flutter_highlight: ^0.7.0
  shimmer: ^3.0.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0
  flutter_tts: ^4.2.0
  fl_chart: ^0.70.0
  sensors_plus: ^4.0.0
  geolocator: ^11.0.0
  battery_plus: ^5.0.0
  firebase_core: ^3.11.0
  firebase_messaging: ^15.2.5
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  custom_lint: ^0.7.1
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
