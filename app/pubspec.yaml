name: nself_claw
description: "ɳClaw — personal AI assistant with infinite memory"
publish_to: none
version: 1.1.1+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  # Localisation
  flutter_localizations:
    sdk: flutter
  intl: any

  # UI
  cupertino_icons: ^1.0.8
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.4
  flutter_highlight: ^0.7.0
  markdown: ^7.2.0

  # State management
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0
  provider: ^6.1.0

  # Networking
  http: ^1.2.0
  web_socket_channel: ^3.0.0

  # Storage & paths
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqflite_sqlcipher: ^3.3.0
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_secure_storage: ^9.2.0

  # Auth SDK
  nself_auth_sdk:
    path: ../../../plugins-pro/paid/auth/flutter
  local_auth: ^2.3.0

  # Notifications & messaging
  flutter_local_notifications: ^17.2.0
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0

  # Sharing & files
  share_plus: ^10.0.0
  file_picker: ^8.1.0
  image_picker: ^1.1.0

  # Device info & connectivity
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  connectivity_plus: ^6.0.0

  # Camera & scanning
  mobile_scanner: ^7.2.0
  app_links: ^6.3.0

  # Voice & speech
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Permissions
  permission_handler: ^11.3.0

  # Sensors & location
  sensors_plus: ^4.0.0
  geolocator: ^11.0.0
  battery_plus: ^6.2.0

  # Webview
  webview_flutter: ^4.10.0

  # Background & widgets
  home_widget: ^0.7.0
  workmanager: ^0.5.2

  # Error tracking
  sentry_flutter: ^8.9.0

  # Desktop-only
  hotkey_manager: ^0.2.0
  window_manager: ^0.4.0
  desktop_drop: ^0.4.0
  tray_manager: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.0
  flutter_native_splash: ^2.4.0
  msix: ^3.16.0
  riverpod_generator: ^2.6.0
  build_runner: ^2.4.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.0

flutter_launcher_icons:
  ios: true
  android: "launcher_icon"
  image_path: ".github/wiki/brand/claw-icon-1024.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  adaptive_icon_background: "#0F0F1A"
  adaptive_icon_foreground: ".github/wiki/brand/claw-icon-fg-432.png"
  adaptive_icon_monochrome: ".github/wiki/brand/claw-icon-mono-432.png"
  # UD-P96-05 default: Windows and web platforms stripped from nclaw.
  # nclaw targets iOS, Android, and macOS only.
  macos:
    generate: true
    image_path: ".github/wiki/brand/claw-icon-1024.png"

flutter_native_splash:
  color: "#0F0F1A"
  image: ".github/wiki/brand/claw-icon-1024.png"
  ios: true
  android: true
  android_12:
    color: "#0F0F1A"
    icon_background_color: "#0F0F1A"
    image: ".github/wiki/brand/claw-icon-1024.png"
  # UD-P96-05: web platform stripped from nclaw — iOS/Android/macOS only.
  web: false

msix_config:
  display_name: ɳClaw
  publisher_display_name: nSelf, Inc.
  identity_name: com.nself.claw
  publisher: CN=nSelf Inc., O=nSelf Inc., L=Wilmington, S=Delaware, C=US
  msix_version: 1.1.0.0
  logo_path: .github/wiki/brand/claw-icon-256.png
  capabilities: internetClient, microphone, webcam
  architecture: x64

flutter:
  uses-material-design: true
  generate: true
