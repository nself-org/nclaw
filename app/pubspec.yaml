name: nclaw
description: "Flutter companion app for nClaw AI assistant. Connects to a self-hosted nSelf backend running the nself-claw plugin."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  flutter_secure_storage: ^9.2.4
  web_socket_channel: ^3.0.2
  http: ^1.3.0
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  custom_lint: ^0.7.1
  riverpod_lint: ^2.6.3

flutter:
  uses-material-design: true
