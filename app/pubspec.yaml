name: nself_claw
description: "ɳClaw — personal AI assistant with infinite memory"
publish_to: none
version: 1.0.9+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: 1.0.8
  shimmer: 3.0.0
  flutter_markdown: 0.7.4
  flutter_highlight: 0.7.0
  markdown: 7.2.2

  # State management
  flutter_riverpod: 2.6.1
  riverpod_annotation: 2.6.1
  provider: 6.1.2

  # Networking
  http: 1.2.2
  web_socket_channel: 3.0.1

  # Storage & paths
  sqflite: 2.3.3+1
  sqflite_common_ffi: 2.3.3
  path_provider: 2.1.4
  path: 1.9.1
  flutter_secure_storage: 9.2.2

  # Auth
  local_auth: 2.3.0

  # Notifications & messaging
  flutter_local_notifications: 17.2.3
  firebase_core: 3.6.0
  firebase_messaging: 15.1.3

  # Sharing & files
  share_plus: 10.0.2
  file_picker: 8.1.2
  image_picker: 1.1.2

  # Device info & connectivity
  url_launcher: 6.3.1
  package_info_plus: 8.0.2
  device_info_plus: 10.1.2
  connectivity_plus: 6.0.5

  # Camera & scanning
  mobile_scanner: 7.2.0
  app_links: 6.3.3

  # Voice & speech
  speech_to_text: 7.0.0
  flutter_tts: 4.2.0

  # Permissions
  permission_handler: 11.3.0

  # Sensors & location
  sensors_plus: 4.0.2
  geolocator: 11.0.0
  battery_plus: 6.2.3

  # Webview
  webview_flutter: 4.10.0

  # Background & widgets
  home_widget: 0.7.0
  workmanager: 0.5.2

  # Error tracking
  sentry_flutter: 8.9.0

  # Desktop-only
  system_tray: 2.0.3
  hotkey_manager: 0.2.3
  window_manager: 0.4.2
  desktop_drop: 0.4.4
  tray_manager: 0.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 4.0.0
  flutter_launcher_icons: 0.14.1
  flutter_native_splash: 2.4.1
  msix: 3.16.7
  riverpod_generator: 2.6.3
  build_runner: 2.4.14
  custom_lint: 0.7.1
  riverpod_lint: 2.6.3

flutter_launcher_icons:
  ios: true
  android: "launcher_icon"
  image_path: ".github/wiki/brand/claw-icon-1024.png"
  min_sdk_android: 24
  remove_alpha_ios: true
  adaptive_icon_background: "#0F0F1A"
  adaptive_icon_foreground: ".github/wiki/brand/claw-icon-fg-432.png"
  adaptive_icon_monochrome: ".github/wiki/brand/claw-icon-mono-432.png"
  web:
    generate: true
    image_path: ".github/wiki/brand/claw-icon-1024.png"
  macos:
    generate: true
    image_path: ".github/wiki/brand/claw-icon-1024.png"

flutter_native_splash:
  color: "#0F0F1A"
  image: ".github/wiki/brand/claw-icon-1024.png"
  ios: true
  android: true
  android_12:
    color: "#0F0F1A"
    icon_background_color: "#0F0F1A"
    image: ".github/wiki/brand/claw-icon-1024.png"
  web: true

msix_config:
  display_name: ɳClaw
  publisher_display_name: nSelf, Inc.
  identity_name: com.nself.claw
  publisher: CN=nSelf Inc., O=nSelf Inc., L=Wilmington, S=Delaware, C=US
  msix_version: 1.1.0.0
  logo_path: .github/wiki/brand/claw-icon-256.png
  capabilities: internetClient, microphone, webcam
  architecture: x64

flutter:
  uses-material-design: true
