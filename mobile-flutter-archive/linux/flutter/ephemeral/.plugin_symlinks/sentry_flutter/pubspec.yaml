name: sentry_flutter
version: 9.20.0
description: >-
  Sentry SDK for Flutter. This package aims to support different Flutter targets
  by relying on the many platforms supported by Sentry with native SDKs.
homepage: https://docs.sentry.io/platforms/flutter/
repository: https://github.com/getsentry/sentry-dart
issue_tracker: https://github.com/getsentry/sentry-dart/issues
documentation: https://docs.sentry.io/platforms/flutter/
environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'
platforms:
  android: null
  ios: null
  macos: null
  linux: null
  windows: null
  web: null
dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  sentry: 9.20.0
  package_info_plus: '>=1.0.0'
  meta: ^1.3.0
  ffi: ^2.0.0
  web: ^1.1.0
  jni: 0.14.2
dev_dependencies:
  build_runner: ^2.4.2
  collection: ^1.16.0
  flutter_test:
    sdk: flutter
  mockito: ^5.1.0
  yaml: ^3.1.0
  flutter_lints: '>=4.0.0'
  remove_from_coverage: ^2.0.0
  http: ^1.2.2
  flutter_localizations:
    sdk: flutter
  ffigen:
    git:
      url: https://github.com/getsentry/ffigen
      ref: 6aa2c2642f507eab3df83373189170797a9fa5e7
  jnigen: 0.14.2
  platform: any
flutter:
  plugin:
    platforms:
      android:
        pluginClass: SentryFlutterPlugin
        package: io.sentry.flutter
      ios:
        pluginClass: SentryFlutterPlugin
      macos:
        pluginClass: SentryFlutterPlugin
      web:
        pluginClass: SentryFlutterWeb
        fileName: sentry_flutter_web.dart
      linux:
        pluginClass: SentryFlutterPlugin
      windows:
        pluginClass: SentryFlutterPlugin
