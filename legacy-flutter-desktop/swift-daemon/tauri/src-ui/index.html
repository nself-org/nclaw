<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ɳClaw Companion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0F0F1A;
      color: #E2E8F0;
      padding: 24px;
      min-height: 100vh;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #0EA5E9;
      margin-bottom: 20px;
    }
    .status-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #1E1E2E;
      font-size: 13px;
    }
    .status-row:last-child { border-bottom: none; }
    .label { color: #94A3B8; }
    .value { color: #E2E8F0; text-align: right; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }
    .value.connected { color: #34D399; }
    .value.disconnected { color: #F87171; }
    .pair-dialog {
      display: none;
      margin-top: 20px;
      padding: 16px;
      background: #1E1E2E;
      border-radius: 8px;
    }
    .pair-dialog.visible { display: block; }
    .pair-dialog label {
      display: block;
      font-size: 12px;
      color: #94A3B8;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    .pair-dialog label:first-child { margin-top: 0; }
    .pair-dialog input {
      width: 100%;
      padding: 8px 10px;
      background: #0F0F1A;
      border: 1px solid #334155;
      border-radius: 4px;
      color: #E2E8F0;
      font-size: 13px;
      outline: none;
    }
    .pair-dialog input:focus { border-color: #0EA5E9; }
    .pair-dialog button {
      margin-top: 16px;
      width: 100%;
      padding: 8px;
      background: #0EA5E9;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    .pair-dialog button:hover { background: #4F46E5; }
    .pair-dialog .error { color: #F87171; font-size: 12px; margin-top: 8px; }
    .pair-dialog .success { color: #34D399; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>ɳClaw Companion</h1>

  <div id="status-container">
    <div class="status-row">
      <span class="label">Server</span>
      <span class="value" id="server-url">Loading...</span>
    </div>
    <div class="status-row">
      <span class="label">Connection</span>
      <span class="value" id="connection-status">Loading...</span>
    </div>
    <div class="status-row">
      <span class="label">Watch Directory</span>
      <span class="value" id="watch-dir">Loading...</span>
    </div>
    <div class="status-row">
      <span class="label">Last Sync</span>
      <span class="value" id="last-sync">Never</span>
    </div>
    <div class="status-row">
      <span class="label">Version</span>
      <span class="value" id="version">Loading...</span>
    </div>
  </div>

  <div id="pair-dialog" class="pair-dialog">
    <label for="input-server">Server URL</label>
    <input id="input-server" type="url" placeholder="https://your-server.example.com" />
    <label for="input-code">Pair Code</label>
    <input id="input-code" type="text" placeholder="Enter pairing code" />
    <button id="pair-btn">Pair Device</button>
    <div id="pair-message"></div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;

    async function refreshStatus() {
      try {
        const status = await invoke("get_status");
        document.getElementById("server-url").textContent = status.server_url;
        const connEl = document.getElementById("connection-status");
        if (status.authenticated) {
          connEl.textContent = "Connected";
          connEl.className = "value connected";
        } else {
          connEl.textContent = "Not paired";
          connEl.className = "value disconnected";
        }
        document.getElementById("watch-dir").textContent = status.watch_directory;
        document.getElementById("version").textContent = "v" + status.version;
      } catch (e) {
        console.error("Failed to get status:", e);
      }
    }

    window.showPairDialog = function () {
      document.getElementById("pair-dialog").classList.add("visible");
    };

    document.getElementById("pair-btn").addEventListener("click", async () => {
      const serverUrl = document.getElementById("input-server").value.trim();
      const pairCode = document.getElementById("input-code").value.trim();
      const msgEl = document.getElementById("pair-message");

      if (!serverUrl || !pairCode) {
        msgEl.className = "error";
        msgEl.textContent = "Both fields are required.";
        return;
      }

      try {
        const result = await invoke("pair_device", { serverUrl, pairCode });
        msgEl.className = "success";
        msgEl.textContent = result;
        document.getElementById("pair-dialog").classList.remove("visible");
        await refreshStatus();
      } catch (e) {
        msgEl.className = "error";
        msgEl.textContent = String(e);
      }
    });

    refreshStatus();
    setInterval(refreshStatus, 30000);
  </script>
</body>
</html>
